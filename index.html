<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carnet de chants - Senzala Villefranche</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            yellow: '#FCB13D',
                            coral: '#F7784A',
                            brown: '#9F512A',
                            purple: '#5E4FDE'
                        }
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '3rem',
                    }
                }
            }
        }
    </script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #FFFDF9; color: #1f2937; -webkit-tap-highlight-color: transparent; }
        .brand-gradient { background: linear-gradient(135deg, #FCB13D 0%, #F7784A 100%); }
        .brand-shadow { box-shadow: 0 20px 40px -15px rgba(247, 120, 74, 0.3); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 15px 30px -10px rgba(159, 81, 42, 0.2); }
        
        @media print {
            .no-print { display: none !important; }
            .page-break { page-break-after: always; }
            body { background-color: white; color: black; }
        }

        .loader { 
            border: 3px solid rgba(252, 177, 61, 0.2);
            border-top: 3px solid #FCB13D;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .veneer-title {
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 0.9;
        }

        input, select, textarea { font-size: 16px !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="fallback-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; font-family: sans-serif; background-color: #FFFDF9;">
        <h1 style="color: #F7784A; font-size: 2.5rem; margin-bottom: 1rem; text-transform: uppercase; font-weight: 800; letter-spacing: -0.05em;">Senzala</h1>
        <p id="fallback-text" style="color: #9F512A; max-width: 400px; line-height: 1.5; font-weight: 600;">Authentification sécurisée...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURATION IA SÉCURISÉE (VIA GOOGLE APPS SCRIPT) ---
        // Remplacez 'XXXXX' par l'identifiant réel de votre script de déploiement
        const GOOGLE_APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxc48_A-pg9JRW_Kjci5D4ROY3a6FYOMlUocWvadnrP3okBMh4KHh4l_n-s10uOhDEsg/exec"; 
        
        // Utilisée uniquement en secours si le script GAS n'est pas encore configuré
        const fallbackEnvApiKey = ""; 
        
        // Liste des modèles demandés
        const MODELS_TO_TEST = [
            "gemini-2.5-flash-preview-09-2025",
            "gemini-2.5-flash",
            "gemini-3-flash",
            "gemini-2.5-flash-lite",
            "gemini-3.1-flash-lite",
            "gemini-2.0-flash",
            "gemini-1.5-flash"
        ];

        const { useState, useEffect, useMemo } = React;

        // --- FIREBASE CONFIGURATION (Projet personnel chanson-capoeira) ---
        const personalFirebaseConfig = {
            apiKey: "AIzaSyCwCyoInQ06ctRzBtFLSUs9ZW1BamlyANs",
            authDomain: "chanson-capoeira.firebaseapp.com",
            projectId: "chanson-capoeira",
            storageBucket: "chanson-capoeira.firebasestorage.app",
            messagingSenderId: "127515903773",
            appId: "1:127515903773:web:54886cc97ee9bd2688c3f4"
        };
        
        let db = null;
        let auth = null;

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(personalFirebaseConfig);
            }
            db = firebase.firestore();
            auth = firebase.auth();
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        // Collection directe pour votre projet personnel
        const dbCollectionName = "songs"; 

        const SONG_TYPES = ["Corrido", "Ladainha", "Chula / Louvação", "Quadra", "Maculelê", "Puxada de Rede", "Samba de Roda", "Autre"];
        const RHYTHMS = ["Angola", "Benguela", "São Bento Grande", "Iuna", "Regional", "Libre", "Puxada"];

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                music: <path d="M9 18V5l12-2v13M6 18a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm12-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path>,
                search: <><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></>,
                trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>,
                info: <><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></>,
                youtube: <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2c.46-1.7.46-5.33.46-5.33s0-3.63-.46-5.33zM9.75 15.02V8.48L15.45 11.75l-5.7 3.27z"></path>,
                share: <><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></>,
                check: <polyline points="20 6 9 17 4 12"></polyline>,
                back: <><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></>,
                alert: <><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></>,
                sort: <><line x1="3" y1="6" x2="15" y2="6"></line><line x1="3" y1="12" x2="11" y2="12"></line><line x1="3" y1="18" x2="13" y2="18"></line><polyline points="16 14 20 18 24 14"></polyline><line x1="20" y1="6" x2="20" y2="18"></line></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10"></circle>}
                </svg>
            );
        };

        function App() {
            useEffect(() => {
                const fallback = document.getElementById('fallback-screen');
                if (fallback) fallback.style.display = 'none';
            }, []);

            const [user, setUser] = useState(null);
            const [songs, setSongs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [view, setView] = useState('list'); 
            const [currentSong, setCurrentSong] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedType, setSelectedType] = useState('');
            const [sortBy, setSortBy] = useState('title_asc'); 
            const [isSelectionMode, setIsSelectionMode] = useState(false);
            const [selectedSongs, setSelectedSongs] = useState([]);
            const [showConfirmDelete, setShowConfirmDelete] = useState(null);
            
            const [formData, setFormData] = useState({ title: '', lyrics: '', translation: '', rhythm: '', note: '', songType: '', youtubeLink: '' });
            const [aiLoading, setAiLoading] = useState(false);
            const [aiStatus, setAiStatus] = useState("");
            const [toastMessage, setToastMessage] = useState("");

            // --- AUTHENTIFICATION ---
            useEffect(() => {
                const initAuth = async () => {
                    if (!auth) return;
                    try {
                        // Connexion anonyme (utile si vos règles Firestore l'exigent)
                        await auth.signInAnonymously();
                    } catch (e) {
                        console.error("Auth error", e);
                        // On ne bloque PAS l'application ici si l'auth échoue
                        // La base de données est peut-être en accès public.
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => { 
                    setUser(u); 
                });
                return () => unsubscribe();
            }, []);

            // --- SYNCHRONISATION DES CHANTS ---
            useEffect(() => {
                if (!db) return; // On ne bloque plus sur "user" !
                
                const songsCollection = db.collection(dbCollectionName);
                const unsubscribe = songsCollection.onSnapshot(
                    snap => {
                        const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setSongs(data);
                        setLoading(false);
                    },
                    err => { 
                        console.error("Firestore error:", err);
                        setError(`Connexion Firebase perdue ou bloquée : ${err.message}`); 
                        setLoading(false); 
                    }
                );
                return () => unsubscribe();
            }, []);

            // --- IA VIA GOOGLE APPS SCRIPT ---
            const handleGenerateAI = async () => {
                if (!formData.title.trim()) return;
                
                setAiLoading(true);
                setError(null);

                const systemPrompt = `Tu es l'expert archiviste de la Capoeira Senzala.
                Identifie et recherche le chant : "${formData.title}".
                RÈGLES ABSOLUES ET STRICTES :
                1. Utilise tes outils de recherche Google pour trouver les paroles réelles et authentiques.
                2. N'INVENTE JAMAIS DE PAROLES. Si ta recherche ne donne aucun résultat probant pour ce chant précis, écris EXACTEMENT "Chanson non trouvée" dans les champs "lyrics" et "translation".
                3. CORRIGE le titre si tu trouves la bonne orthographe.
                4. Trouve l'histoire ou le contexte.
                Réponds EXCLUSIVEMENT avec le format JSON exact suivant (sans balises markdown) :
                {
                  "title": "Titre corrigé",
                  "lyrics": "Paroles ou 'Chanson non trouvée'",
                  "translation": "Traduction ou 'Chanson non trouvée'",
                  "songType": "Style",
                  "rhythm": "Rythme",
                  "note": "Note historique...",
                  "youtubeLink": "Lien URL"
                }`;

                const userQuery = `Recherche authentique pour le chant de capoeira : "${formData.title}"`;
                
                // Préparation de la question complète envoyée au script
                const maQuestion = `${systemPrompt}\n\nRecherche pour : ${userQuery}`;
                
                // Vérification si le script GAS est configuré, sinon on utilise l'API directe en fallback
                const useGoogleAppsScript = GOOGLE_APPS_SCRIPT_URL && !GOOGLE_APPS_SCRIPT_URL.includes("XXXXX");

                const fetchWithRetry = async (retries = 3) => {
                    const delays = [1000, 2000, 4000];
                    
                    for (const model of MODELS_TO_TEST) {
                        for (let i = 0; i <= retries; i++) {
                            setAiStatus(i > 0 ? `Nouvelle tentative (${i})...` : `Identification (${model})...`);
                            
                            try {
                                let response;
                                
                                if (useGoogleAppsScript) {
                                    // APPEL VIA VOTRE SCRIPT GAS SÉCURISÉ
                                    response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                                        method: 'POST',
                                        // text/plain est recommandé pour éviter les requêtes preflight CORS bloquées par GAS
                                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                        body: JSON.stringify({ 
                                            prompt: maQuestion,
                                            model: model // Votre script GAS peut utiliser ce paramètre pour le payload Gemini
                                        })
                                    });
                                } else {
                                    // FALLBACK DIRECT API SI LE SCRIPT N'EST PAS PRÊT
                                    const directUrl = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${fallbackEnvApiKey}`;
                                    response = await fetch(directUrl, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            contents: [{ parts: [{ text: maQuestion }] }],
                                            tools: [{ "google_search": {} }]
                                        })
                                    });
                                }

                                if (!response.ok) {
                                    if (response.status === 429 && i < retries) {
                                        await new Promise(r => setTimeout(r, delays[i]));
                                        continue; // Réessai pour quota
                                    }
                                    if (response.status === 404) break; // Modèle non trouvé, on passe au suivant
                                    throw new Error(`HTTP ${response.status}`);
                                }

                                const result = await response.json();
                                
                                // Extraction robuste : gère la réponse directe Gemini ou la réponse parsée du GAS
                                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || result.text || result.response;
                                
                                if (text) {
                                    // Nettoyage agressif des balises markdown que l'IA ajoute parfois
                                    const cleanText = text.replace(/```json/gi, '').replace(/```/gi, '').trim();
                                    const firstBrace = cleanText.indexOf('{');
                                    const lastBrace = cleanText.lastIndexOf('}');

                                    if (firstBrace !== -1 && lastBrace !== -1) {
                                        const jsonString = cleanText.substring(firstBrace, lastBrace + 1);
                                        const data = JSON.parse(jsonString);
                                        
                                        setFormData(prev => ({ 
                                            ...prev, 
                                            title: data.title || data.titre || prev.title,
                                            lyrics: data.lyrics || data.parole || data.paroles || "",
                                            translation: data.translation || data.traduction || "",
                                            songType: data.songType || data.type || prev.songType,
                                            rhythm: data.rhythm || data.rythme || prev.rhythm,
                                            note: data.note || prev.note,
                                            youtubeLink: data.youtubeLink || data.lien || prev.youtubeLink
                                        }));
                                        return true; // Succès !
                                    }
                                }
                            } catch (e) {
                                if (i === retries) {
                                    console.warn(`Le modèle ${model} a échoué. Passage au modèle suivant.`);
                                    break; // On passe au modèle suivant dans la boucle principale
                                }
                                await new Promise(r => setTimeout(r, delays[i]));
                            }
                        }
                    }
                    throw new Error("Tous les modèles testés ont échoué ou le script est inaccessible.");
                };

                try {
                    await fetchWithRetry();
                } catch (e) {
                    setError(`L'IA n'a pas pu répondre (${e.message}). Si vous utilisez Apps Script, vérifiez son déploiement.`);
                } finally {
                    setAiLoading(false);
                    setAiStatus("");
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!formData.title.trim() || !db) return;
                try {
                    const dataToSave = { 
                        ...formData, 
                        updatedAt: new Date().toISOString(),
                        createdAt: formData.createdAt || new Date().toISOString()
                    };
                    const docId = dataToSave.id;
                    if (docId) delete dataToSave.id; 

                    if (docId) {
                        await db.collection(dbCollectionName).doc(docId).set(dataToSave, { merge: true });
                    } else {
                        await db.collection(dbCollectionName).add(dataToSave);
                    }
                    
                    setView('list');
                    setFormData({ title:'', lyrics:'', translation:'', rhythm:'', note:'', songType:'', youtubeLink:'' });
                    setToastMessage("Chant enregistré !");
                    setTimeout(() => setToastMessage(""), 2000);
                } catch (err) { setError("Erreur de sauvegarde."); }
            };

            const confirmDelete = async () => {
                if(!showConfirmDelete) return;
                try {
                    await db.collection(dbCollectionName).doc(showConfirmDelete).delete();
                    if(currentSong && currentSong.id === showConfirmDelete) setView('list');
                    setShowConfirmDelete(null);
                    setToastMessage("Chant supprimé.");
                    setTimeout(() => setToastMessage(""), 2000);
                } catch(e) { setError("Erreur de suppression."); setShowConfirmDelete(null); }
            }

            const filteredAndSortedSongs = useMemo(() => {
                let res = songs.filter(s => 
                    (s.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    (s.lyrics || "").toLowerCase().includes(searchTerm.toLowerCase())) &&
                    (!selectedType || s.songType === selectedType)
                );
                return res.sort((a, b) => {
                    if (sortBy === 'title_asc') return (a.title || "").localeCompare(b.title || "");
                    if (sortBy === 'title_desc') return (b.title || "").localeCompare(a.title || "");
                    if (sortBy === 'newest') return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
                    return 0;
                });
            }, [songs, searchTerm, selectedType, sortBy]);

            const handleShare = async (song) => {
                const text = `🎵 ${song.title}\n\n${song.lyrics}\n\n- Carnet Senzala Villefranche`;
                if (navigator.share) { try { await navigator.share({ title: song.title, text }); return; } catch(e) {} }
                const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                setToastMessage("Copié !"); setTimeout(() => setToastMessage(""), 2000);
            };

            if (loading) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-[#FFFDF9] p-6 text-center text-brand-brown">
                    <div className="loader mb-6 shadow-sm"></div>
                    <p className="font-display tracking-[0.2em] uppercase text-sm animate-pulse text-brand-coral">Connexion carnet de chant Senzala...</p>
                </div>
            );

            if (view === 'print') {
                const toPrint = songs.filter(s => selectedSongs.includes(s.id));
                return (
                    <div className="bg-white min-h-screen p-8 md:p-16 text-black font-sans">
                        <div className="no-print flex gap-4 mb-12 justify-center">
                            <button onClick={() => setView('list')} className="px-6 py-2 border-2 border-neutral-200 rounded-2xl font-bold text-xs hover:bg-neutral-50 transition-colors">Fermer</button>
                            <button onClick={() => window.print()} className="px-6 py-2 brand-gradient text-white rounded-2xl font-bold shadow-lg text-xs transition-opacity hover:opacity-90">Imprimer PDF</button>
                        </div>
                        <div className="max-w-4xl mx-auto border-b-8 border-brand-yellow pb-8 mb-16 text-center">
                            <h1 className="text-6xl font-display font-bold text-brand-coral veneer-title tracking-tight leading-none text-balance">Carnet de chants</h1>
                            <p className="font-bold text-brand-yellow tracking-[0.4em] uppercase mt-4 text-sm">Senzala Villefranche</p>
                        </div>
                        <div className="space-y-32 max-w-4xl mx-auto">
                            {toPrint.map(s => (
                                <div key={s.id} className="page-break border-l-[16px] border-brand-yellow/10 pl-10">
                                    <div className="flex justify-between items-end border-b-2 border-brand-coral/10 pb-6 mb-10">
                                        <h3 className="text-5xl font-display font-bold veneer-title leading-none">{s.title}</h3>
                                        <span className="text-[12px] font-black text-brand-coral uppercase tracking-widest bg-brand-coral/5 px-4 py-1.5 rounded-full">{s.songType} / {s.rhythm}</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-16 mb-12">
                                        <div className="whitespace-pre-wrap text-[16px] leading-relaxed font-bold text-neutral-900">{s.lyrics}</div>
                                        <div className="whitespace-pre-wrap text-[15px] italic text-neutral-600 leading-relaxed border-l border-neutral-100 pl-8">{s.translation}</div>
                                    </div>
                                    {s.note && <div className="bg-neutral-50 p-8 rounded-[3rem] text-[14px] text-neutral-700 leading-relaxed border-t-4 border-brand-yellow shadow-inner"><strong>Note :</strong> {s.note}</div>}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#FFFDF9] font-sans pb-12">
                    <header className="brand-gradient text-white px-5 py-5 sticky top-0 z-50 brand-shadow no-print">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4 cursor-pointer" onClick={() => {setView('list'); setIsSelectionMode(false);}}>
                                <div className="bg-white/20 p-2.5 rounded-2xl backdrop-blur-lg shadow-inner text-white"><Icon name="music" className="w-7 h-7" /></div>
                                <div>
                                    <h1 className="text-2xl font-display font-bold uppercase leading-none tracking-tight veneer-title text-white">Carnet</h1>
                                    <span className="text-[10px] font-bold opacity-90 uppercase tracking-[0.2em] block mt-1 text-white">Senzala Villefranche</span>
                                </div>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={() => setIsSelectionMode(!isSelectionMode)} className={`px-5 py-2.5 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all ${isSelectionMode ? 'bg-black/30 text-brand-yellow shadow-inner' : 'bg-white/10 hover:bg-white/20'}`}>
                                    {isSelectionMode ? 'Quitter' : 'Livret'}
                                </button>
                                <button onClick={() => { setFormData({title:'', lyrics:'', translation:'', rhythm:'', note:'', songType:'', youtubeLink:''}); setView('form'); }} className="bg-white text-brand-coral px-6 py-2.5 rounded-2xl text-[11px] font-black uppercase shadow-lg active:scale-95 transition-all">Nouveau</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-10 animate-in">
                        {error && (
                            <div className="mb-8 bg-white border-2 border-red-100 p-6 rounded-[2.5rem] shadow-xl flex items-center gap-4 animate-in">
                                <div className="bg-red-50 p-3 rounded-full mt-1"><Icon name="alert" className="w-6 h-6 text-red-600 flex-shrink-0" /></div>
                                <div className="flex-1 text-sm font-bold text-red-600 leading-relaxed whitespace-pre-wrap">{error}</div>
                                <button onClick={() => setError(null)} className="ml-auto text-xs font-black text-red-600 uppercase underline">Fermer</button>
                            </div>
                        )}

                        {toastMessage && (
                            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-neutral-900 text-brand-yellow px-8 py-4 rounded-full shadow-2xl font-bold text-xs uppercase tracking-widest z-50 animate-in">
                                {toastMessage}
                            </div>
                        )}

                        {showConfirmDelete && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6 animate-in">
                                <div className="bg-white rounded-[3rem] p-10 max-w-sm w-full text-center shadow-2xl border border-neutral-100">
                                    <h4 className="text-2xl font-display font-bold uppercase mb-4 leading-none tracking-tight">Supprimer ?</h4>
                                    <p className="text-neutral-500 text-sm mb-10 leading-relaxed font-medium">Cette action supprimera le chant de la collection Senzala.</p>
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowConfirmDelete(null)} className="flex-1 py-4 bg-neutral-50 rounded-2xl font-bold text-xs uppercase tracking-widest">Annuler</button>
                                        <button onClick={confirmDelete} className="flex-1 py-4 bg-red-500 text-white rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-red-200">Supprimer</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'list' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-12 gap-4 bg-white p-4 rounded-[2.5rem] shadow-sm border border-neutral-100">
                                    <div className="md:col-span-5 relative">
                                        <Icon name="search" className="absolute left-5 top-1/2 -translate-y-1/2 text-brand-yellow w-5 h-5" />
                                        <input type="text" placeholder="Rechercher titre ou paroles..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-14 pr-5 py-4 rounded-2xl bg-neutral-50 border-none outline-none focus:ring-4 focus:ring-brand-yellow/10 font-medium text-base transition-all" />
                                    </div>
                                    <div className="md:col-span-3">
                                        <select value={selectedType} onChange={e => setSelectedType(e.target.value)} className="w-full px-6 py-4 rounded-2xl bg-neutral-50 border-none font-bold text-brand-brown text-xs uppercase tracking-[0.2em] outline-none cursor-pointer appearance-none text-center">
                                            <option value="">Tous les styles</option>
                                            {SONG_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div className="md:col-span-4">
                                        <div className="relative">
                                            <Icon name="sort" className="absolute left-5 top-1/2 -translate-y-1/2 text-brand-yellow w-4 h-4 pointer-events-none" />
                                            <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="w-full pl-12 pr-6 py-4 rounded-2xl bg-neutral-50 border-none font-bold text-neutral-400 text-[10px] uppercase tracking-[0.2em] outline-none cursor-pointer appearance-none">
                                                <option value="title_asc">Titre A-Z</option>
                                                <option value="title_desc">Titre Z-A</option>
                                                <option value="newest">Plus récents</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                {isSelectionMode && (
                                    <div className="brand-gradient p-8 rounded-[3rem] flex flex-col sm:flex-row justify-between items-center gap-6 shadow-2xl text-white animate-in">
                                        <div className="flex items-center gap-5">
                                            <span className="bg-white text-brand-coral w-14 h-14 rounded-full flex items-center justify-center font-display font-bold text-3xl shadow-inner text-brand-coral">{selectedSongs.length}</span>
                                            <div className="veneer-title text-white text-center md:text-left">
                                                <p className="font-bold text-lg uppercase tracking-tight leading-none">Chants sélectionnés</p>
                                                <p className="text-[10px] uppercase tracking-widest opacity-80 mt-1">Générez un PDF avec les chants cochés</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setView('print')} disabled={selectedSongs.length === 0} className="w-full sm:w-auto bg-neutral-900 text-brand-yellow px-12 py-4 rounded-[1.5rem] font-black text-xs uppercase shadow-xl disabled:opacity-30 tracking-widest transition-all">Générer le PDF</button>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {filteredAndSortedSongs.map(s => (
                                        <div key={s.id} onClick={() => isSelectionMode ? toggleSelection(s.id) : (setCurrentSong(s), setView('detail'))}
                                             className={`bg-white p-8 rounded-[3rem] shadow-sm border-2 transition-all cursor-pointer relative group flex flex-col h-full card-hover ${isSelectionMode && selectedSongs.includes(s.id) ? 'border-brand-yellow bg-brand-yellow/5 scale-[0.97]' : 'border-transparent hover:border-brand-yellow/30'}`}>
                                            <div className="flex justify-between items-start mb-6">
                                                <span className="px-3 py-1 bg-brand-yellow/10 text-brand-brown text-[9px] font-black uppercase tracking-[0.2em] rounded-lg border border-brand-yellow/20">{s.songType}</span>
                                                {isSelectionMode && (
                                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center shadow-inner transition-colors ${selectedSongs.includes(s.id) ? 'bg-brand-yellow border-brand-yellow' : 'bg-white border-neutral-200'}`}>
                                                        {selectedSongs.includes(s.id) && <Icon name="check" className="w-5 h-5 text-white"/>}
                                                    </div>
                                                )}
                                            </div>
                                            <h3 className="text-2xl font-display font-bold text-neutral-800 line-clamp-2 uppercase leading-[1] mb-3 group-hover:text-brand-coral transition-colors veneer-title tracking-tight leading-none">{s.title}</h3>
                                            <p className="text-[13px] text-neutral-400 line-clamp-3 italic font-medium mt-auto leading-relaxed">{s.lyrics}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'detail' && currentSong && (
                            <div className="bg-white rounded-[3.5rem] shadow-2xl border border-neutral-100 animate-in overflow-hidden">
                                <div className="p-8 md:p-14 border-b-8 border-brand-yellow/10 bg-neutral-50/40">
                                    <div className="flex flex-col md:flex-row justify-between items-start gap-8">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-4">
                                                <span className="px-5 py-2 bg-brand-coral text-white text-[10px] font-black uppercase rounded-xl shadow-md tracking-widest">{currentSong.songType}</span>
                                                <span className="px-5 py-2 bg-white text-brand-brown border border-neutral-200 text-[10px] font-black uppercase rounded-xl shadow-sm">{currentSong.rhythm}</span>
                                            </div>
                                            <h2 className="text-5xl md:text-8xl font-display font-bold text-neutral-900 uppercase tracking-tighter mb-4 veneer-title text-balance leading-none">{currentSong.title}</h2>
                                        </div>
                                        <div className="flex gap-3 bg-white p-3 rounded-[2rem] shadow-xl border border-neutral-100 self-end md:self-start">
                                            <button onClick={() => handleShare(currentSong)} className="p-4 text-brand-yellow hover:bg-brand-yellow/10 rounded-2xl transition-colors" title="Partager"><Icon name="share" className="w-6 h-6" /></button>
                                            {currentSong.youtubeLink && <a href={currentSong.youtubeLink} target="_blank" className="p-4 text-red-600 hover:bg-red-50 rounded-2xl transition-colors" title="Lien"><Icon name="youtube" className="w-6 h-6" /></a>}
                                            <button onClick={() => { setFormData(currentSong); setView('form'); }} className="p-4 text-brand-purple hover:bg-brand-purple/5 rounded-2xl transition-colors" title="Modifier"><Icon name="edit" className="w-6 h-6" /></button>
                                            <button onClick={() => setShowConfirmDelete(currentSong.id)} className="p-4 text-neutral-300 hover:text-red-500 rounded-2xl transition-colors" title="Supprimer"><Icon name="trash" className="w-6 h-6" /></button>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-8 md:p-14">
                                    <div className="grid md:grid-cols-2 gap-12 lg:gap-20">
                                        <section>
                                            <h4 className="text-[12px] font-black text-brand-brown mb-8 uppercase tracking-[0.3em] flex items-center gap-3">
                                                <span className="w-3 h-3 rounded-full bg-brand-yellow animate-pulse"></span> Paroles
                                            </h4>
                                            <div className="whitespace-pre-wrap text-xl font-bold text-neutral-800 leading-relaxed p-10 rounded-[3rem] bg-brand-yellow/5 border border-brand-yellow/10 shadow-inner">{currentSong.lyrics}</div>
                                        </section>
                                        <section>
                                            <h4 className="text-[12px] font-black text-brand-coral mb-8 uppercase tracking-[0.3em] flex items-center gap-3">
                                                <span className="w-3 h-3 rounded-full bg-brand-coral"></span> Traduction
                                            </h4>
                                            <div className="whitespace-pre-wrap text-[18px] font-medium italic text-neutral-600 leading-relaxed p-10 rounded-[3rem] bg-neutral-50 border border-neutral-100 shadow-inner">{currentSong.translation}</div>
                                        </section>
                                    </div>
                                    {currentSong.note && (
                                        <div className="mt-12 p-12 bg-brand-purple/5 rounded-[3.5rem] border border-brand-purple/10 shadow-sm relative overflow-hidden">
                                            <div className="absolute top-0 right-0 w-32 h-32 bg-brand-yellow/10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
                                            <h4 className="text-[12px] font-black text-brand-purple uppercase mb-5 tracking-[0.3em] flex items-center gap-3"><Icon name="info" className="w-5 h-5 text-brand-yellow"/> Culture & Histoire</h4>
                                            <p className="text-base text-neutral-700 leading-relaxed font-medium relative z-10">{currentSong.note}</p>
                                        </div>
                                    )}
                                </div>
                                <div className="p-10 bg-neutral-50 text-center border-t border-neutral-100">
                                    <button onClick={() => setView('list')} className="text-brand-brown font-black text-[11px] uppercase tracking-[0.4em] flex items-center gap-3 mx-auto transition-transform hover:opacity-80"><Icon name="back" className="w-5 h-5" /> Retour au carnet</button>
                                </div>
                            </div>
                        )}

                        {view === 'form' && (
                            <div className="max-w-4xl mx-auto bg-white rounded-[4rem] shadow-2xl border border-neutral-100 animate-in overflow-hidden">
                                <div className="bg-neutral-50 p-10 md:p-14 border-b border-neutral-100 flex justify-between items-center">
                                    <h2 className="text-4xl font-display font-bold text-brand-coral uppercase veneer-title leading-none">{formData.id ? 'Modifier' : 'Nouveau Chant'}</h2>
                                    <button onClick={() => setView('list')} className="text-neutral-300 hover:text-brand-brown p-3 transition-colors"><Icon name="plus" className="w-10 h-10 rotate-45" /></button>
                                </div>
                                <form onSubmit={handleSave} className="p-10 md:p-14 space-y-14">
                                    
                                    <div className="space-y-12">
                                        <div className="relative">
                                            <label className="text-[11px] font-black text-brand-brown uppercase mb-4 block tracking-[0.3em]">Titre du chant (pour recherche IA)</label>
                                            <input type="text" required value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full p-8 bg-neutral-50 rounded-[2.5rem] outline-none font-display font-bold text-4xl focus:ring-8 focus:ring-brand-yellow/10 transition-all border border-neutral-100 shadow-inner text-neutral-800 veneer-title leading-none" placeholder="Ex: Mandei benzer..." />
                                        </div>

                                        <div className="brand-gradient p-10 rounded-[3.5rem] text-white flex flex-col md:flex-row items-center justify-between gap-10 shadow-2xl relative overflow-hidden group">
                                            <div className="relative z-10 flex-1 text-center md:text-left">
                                                <h4 className="font-display font-bold text-4xl text-white tracking-wide flex items-center justify-center md:justify-start gap-3 veneer-title leading-none text-white text-balance leading-none uppercase font-bold">Connexion Sécurisée IA <span className="animate-pulse text-brand-yellow">✨</span></h4>
                                                <p className="text-[14px] opacity-90 font-medium leading-relaxed mt-4 max-w-md">L'IA travaille pour toi</p>
                                            </div>
                                            <button type="button" onClick={handleGenerateAI} disabled={aiLoading || !formData.title} className="bg-white text-brand-coral px-12 py-5 rounded-[2rem] font-black text-[12px] uppercase tracking-[0.2em] shadow-2xl active:scale-95 disabled:opacity-50 min-w-[200px] transition-all hover:scale-105">
                                                {aiLoading ? <span className="flex items-center gap-3"><div className="loader border-brand-coral"></div>{aiStatus}</span> : "Générer via Script"}
                                            </button>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-8">
                                            <div className="group">
                                                <label className="text-[11px] font-black text-neutral-400 uppercase mb-4 block tracking-widest text-center">Style de chant</label>
                                                <select value={formData.songType} onChange={e => setFormData({...formData, songType: e.target.value})} className="w-full p-6 bg-neutral-50 rounded-[2.5rem] font-bold text-[13px] uppercase border-none shadow-inner text-center outline-none focus:ring-8 focus:ring-brand-coral/5 transition-all cursor-pointer appearance-none">
                                                    <option value="">Sélectionner</option>
                                                    {SONG_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                                </select>
                                            </div>
                                            <div className="group">
                                                <label className="text-[11px] font-black text-neutral-400 uppercase mb-4 block tracking-widest text-center">Rythme recommandé</label>
                                                <select value={formData.rhythm} onChange={e => setFormData({...formData, rhythm: e.target.value})} className="w-full p-6 bg-neutral-50 rounded-[2.5rem] font-bold text-[13px] uppercase border-none shadow-inner text-center outline-none focus:ring-8 focus:ring-brand-coral/5 transition-all cursor-pointer appearance-none">
                                                    <option value="">Sélectionner</option>
                                                    {RHYTHMS.map(r => <option key={r} value={r}>{r}</option>)}
                                                </select>
                                            </div>
                                        </div>

                                        <div className="grid md:grid-cols-2 gap-12">
                                            <div>
                                                <label className="text-[11px] font-black text-brand-yellow uppercase mb-4 block tracking-[0.4em] bg-brand-yellow/10 w-max px-5 py-1.5 rounded-full shadow-sm">Paroles</label>
                                                <textarea rows={14} placeholder="Paroles originales..." value={formData.lyrics} onChange={e => setFormData({...formData, lyrics: e.target.value})} className="w-full p-8 bg-neutral-50 rounded-[3.5rem] font-bold text-lg outline-none focus:bg-white border border-neutral-100 transition-all resize-none shadow-inner scrollbar-hide" />
                                            </div>
                                            <div>
                                                <label className="text-[11px] font-black text-brand-coral uppercase mb-4 block tracking-[0.4em] bg-brand-coral/10 w-max px-5 py-1.5 rounded-full shadow-sm">Traduction</label>
                                                <textarea rows={14} placeholder="Traduction française..." value={formData.translation} onChange={e => setFormData({...formData, translation: e.target.value})} className="w-full p-8 bg-orange-50/20 rounded-[3.5rem] italic font-medium text-[16px] outline-none focus:bg-white border border-orange-50/20 transition-all resize-none shadow-inner scrollbar-hide" />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="text-[11px] font-black text-brand-purple uppercase mb-4 block tracking-[0.4em]">Notes & Histoire</label>
                                            <textarea rows={5} value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})} placeholder="Contexte..." className="w-full p-8 bg-neutral-50 rounded-[3.4rem] font-medium text-[15px] outline-none focus:ring-8 focus:ring-brand-purple/5 transition-all resize-none shadow-inner" />
                                        </div>

                                        <div className="bg-red-50/30 p-8 rounded-[3rem] border border-red-100 shadow-inner">
                                            <label className="text-[11px] font-black text-red-500 uppercase mb-4 block tracking-[0.3em] flex items-center gap-3"><Icon name="youtube" className="w-5 h-5"/> Lien</label>
                                            <input type="url" value={formData.youtubeLink} onChange={e => setFormData({...formData, youtubeLink: e.target.value})} placeholder="Lien..." className="w-full p-6 bg-white rounded-[2rem] outline-none text-sm font-bold border border-red-100 shadow-sm focus:ring-4 focus:ring-red-200/20 transition-all" />
                                        </div>
                                    </div>

                                    <div className="flex flex-col sm:flex-row justify-end gap-6 pt-10 border-t-4 border-neutral-50">
                                        <button type="button" onClick={() => setView('list')} className="px-10 py-5 font-black text-neutral-400 uppercase text-[12px] tracking-widest active:scale-95 transition-all hover:text-brand-brown text-center">Annuler</button>
                                        <button type="submit" className="brand-gradient text-white px-16 py-6 rounded-[2.5rem] font-black shadow-2xl uppercase text-[13px] tracking-[0.2em] active:scale-95 hover:scale-[1.02] flex items-center gap-3 justify-center"><Icon name="save" className="w-5 h-5" /> Enregistrer au carnet</button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 py-16 text-center text-neutral-300 no-print border-t-2 border-neutral-50">
                        <div className="w-24 h-2 brand-gradient mx-auto rounded-full mb-10 shadow-inner opacity-20"></div>
                        <p className="text-[10px] font-black uppercase tracking-[0.8em] text-brand-brown/30 leading-loose text-white">Senzala Villefranche • Carnet de chants 2026<br/>By Flecha</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
