<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Polices -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Configuration Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],

                            yellow: '#FCB13D',

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #FFFDF9; color: #1f2937; -webkit-tap-highlight-color: transparent; }
        
        .brand-gradient { 
            background: linear-gradient(135deg, #FCB13D 0%, #F7784A 100%); 
        }
        
        .brand-shadow {
            box-shadow: 0 10px 25px -5px rgba(247, 120, 74, 0.15), 0 8px 10px -6px rgba(247, 120, 74, 0.1);
        }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .page-break { page-break-after: always; }
            @page { margin: 1.5cm; }
            body { background-color: white; color: black; }
        }

        .loader { 
            border: 4px solid rgba(252, 177, 61, 0.2);
            border-top: 4px solid #FCB13D;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(12px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .modal-overlay {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(4px);
        }
        
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background-color: #FCB13D; border-radius: 10px; }
    </style>
</head>
<body>
    <!-- Message d'erreur de secours si le JS plante sur mobile -->
    <div id="fallback-error" style="display: none; padding: 2rem; text-align: center; font-family: sans-serif; color: #9F512A; margin-top: 20vh;">
        <h2 style="color: #F7784A; margin-bottom: 1rem;">Oups ! Accès local bloqué</h2>
        <p>Les navigateurs sur téléphone bloquent souvent les bases de données (Firebase) lorsqu'on ouvre un fichier en local.</p>
        <p style="margin-top: 1rem; font-weight: bold;">Pour l'utiliser sur votre téléphone, hébergez ce fichier gratuitement sur un site comme <em>tiiny.host</em> ou <em>Netlify Drop</em>.</p>
    </div>

    <div id="root"></div>

    <script>
        // Détection globale d'erreur pour éviter la page blanche sur mobile
        window.addEventListener('error', function(event) {
            document.getElementById('loader-container')?.remove();
            document.getElementById('fallback-error').style.display = 'block';
        });
    </script>

    <script type="text/babel">
        // --- CONFIGURATION IA ---
        const apiKey = ""; 
        const HARDCODED_GEMINI_KEY = "AIzaSyAUqrUkzKsbT7N766ArmZf-hyi_JkEhQrc"; 

        const { useState, useEffect, useRef, useMemo } = React;

        // --- CONFIGURATION FIREBASE ---
        const personalFirebaseConfig = {
            apiKey: "AIzaSyCwCyoInQ06ctRzBtFLSUs9ZW1BamlyANs",
            authDomain: "chanson-capoeira.firebaseapp.com",
            projectId: "chanson-capoeira",
            storageBucket: "chanson-capoeira.firebasestorage.app",
            messagingSenderId: "127515903773",
            appId: "1:127515903773:web:54886cc97ee9bd2688c3f4"
        };

        const usePersonalDBInPreview = true; 
        const firebaseConfig = (usePersonalDBInPreview || typeof __firebase_config === 'undefined')
            ? personalFirebaseConfig 
            : JSON.parse(__firebase_config);

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'senzala-villefranche-acervo';

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
        } catch(e) {
            console.error("Firebase init error", e);
            document.getElementById('fallback-error').style.display = 'block';
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Styles de chants
        const SONG_TYPES = ["Corrido", "Ladainha", "Chula / Louvação", "Quadra", "Maculelê", "Puxada de Rede", "Samba de Roda", "Autre"];
        const RHYTHMS = ["Angola", "Benguela", "São Bento Grande", "Iuna", "Regional", "Libre", "Puxada"];

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                music: <><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></>,
                search: <><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></>,
                settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2a2 2 0 0 0-2-2h-.44a2 2 0 0 0-2 2a2 2 0 0 0 2 2a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 0-2 2h.44a2 2 0 0 0 2-2a2 2 0 0 1 2-2a2 2 0 0 1 2 2a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2a2 2 0 0 0-2-2a2 2 0 0 1-2-2a2 2 0 0 1 2-2a2 2 0 0 0 2-2a2 2 0 0 0-2-2z"></path>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></>,
                trash: <><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></>,
                info: <><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></>,
                youtube: <><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2c.46-1.7.46-5.33.46-5.33s0-3.63-.46-5.33z"></path><polygon points="9.75 15.02 15.45 11.75 9.75 8.48 9.75 15.02"></polygon></>,
                check: <polyline points="20 6 9 17 4 12"></polyline>,
                "arrow-left": <><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></>,
                "alert-circle": <><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></>,
                save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></>,
                "file-text": <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></>
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || <circle cx="12" cy="12" r="10"></circle>}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [songs, setSongs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [view, setView] = useState('list'); 
            const [currentSong, setCurrentSong] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedType, setSelectedType] = useState('');
            const [isSelectionMode, setIsSelectionMode] = useState(false);
            const [selectedSongs, setSelectedSongs] = useState([]);
            
            const [userApiKey, setUserApiKey] = useState(localStorage.getItem('senzala_gemini_key') || "");

            const [formData, setFormData] = useState({ title: '', lyrics: '', translation: '', rhythm: '', note: '', songType: '', youtubeLink: '' });
            const [aiLoading, setAiLoading] = useState(false);
            const [aiStatus, setAiStatus] = useState("");

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (!usePersonalDBInPreview && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else if (!auth.currentUser) {
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        console.error("Auth error:", e);
                        // Sur mobile en local, ça échoue souvent. On met loading à false pour afficher l'erreur.
                        setLoading(false);
                        setError("L'authentification Firebase a été bloquée par votre navigateur mobile.");
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const collectionPath = usePersonalDBInPreview ? `songs` : `/artifacts/${appId}/public/data/songs`;
                
                try {
                    const unsubscribeData = db.collection(collectionPath).onSnapshot(
                        (snap) => {
                            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            data.sort((a, b) => (a.title || "").localeCompare(b.title || ""));
                            setSongs(data);
                            setLoading(false);
                        },
                        (err) => {
                            console.error("Firestore error:", err);
                            setError("Accès bloqué. Si vous êtes sur mobile, hébergez ce fichier.");
                            setLoading(false);
                        }
                    );
                    return () => unsubscribeData();
                } catch(e) {
                    setError("Impossible de lire la base de données.");
                    setLoading(false);
                }
            }, [user]);

            const toggleSelection = (id) => {
                if (selectedSongs.includes(id)) {
                    setSelectedSongs(selectedSongs.filter(songId => songId !== id));
                } else {
                    setSelectedSongs([...selectedSongs, id]);
                }
            };

            // --- IA ULTRA-ROBUSTE ---
            const handleGenerateAI = async () => {
                const finalKey = HARDCODED_GEMINI_KEY || apiKey || userApiKey;
                
                if (!finalKey) {
                    setError("Clé API absente. Veuillez configurer la variable HARDCODED_GEMINI_KEY dans le code source.");
                    return;
                }

                if (!formData.title.trim()) return;
                setAiLoading(true);
                setAiStatus("Connexion à l'IA...");
                setError(null);

                const modelsToTry = [
                    "gemini-1.5-flash",
                    "gemini-2.5-flash-preview-09-2025",
                    "gemini-2.0-flash"
                ];

                const systemPrompt = `Tu es l'expert archiviste de la Capoeira Senzala et de la musique afro-brésilienne. 
                MISSION : Identifier précisément un chant de capoeira à partir du titre ou fragment : "${formData.title}".
                
                CONSIGNES OBLIGATOIRES :
                1. Fournis les paroles originales (PT) avec marquage [Solo] et [Coro].
                2. Donne une traduction française poétique et fidèle.
                3. Suggère le "songType" (ex: Corrido, Ladainha, Maculelê) et le "rhythm" (ex: Angola, Benguela, São Bento Grande).
                4. Rédige une "note" explicative sur l'histoire du chant, le contexte dans la roda, ou son auteur.
                5. Trouve un lien YouTube pertinent.
                6. Retourne UNIQUEMENT un objet JSON valide avec les clés exactes : title, lyrics, translation, songType, rhythm, note, youtubeLink.`;

                let lastErrorMessage = "";

                for (const modelId of modelsToTry) {
                    let success = false;
                    let retries = 5;
                    let delay = 2000;

                    while (retries > 0 && !success) {
                        try {
                            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${finalKey}`;
                            const response = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: `Génère les données au format JSON pour le chant : ${formData.title}` }] }],
                                    systemInstruction: { parts: [{ text: systemPrompt }] },
                                    safetySettings: [
                                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                                        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                                        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                                    ],
                                    generationConfig: { 
                                        responseMimeType: "application/json"
                                    }
                                })
                            });

                            if (response.status === 404) {
                                lastErrorMessage = `Modèle ${modelId} introuvable (404).`;
                                break; 
                            }

                            if (response.status === 429) {
                                retries--;
                                if (retries === 0) throw new Error("Limite de requêtes atteinte (429).");
                                setAiStatus(`Surchargé. Attente ${delay/1000}s...`);
                                await new Promise(r => setTimeout(r, delay));
                                delay *= 2;
                                setAiStatus("Nouvelle tentative...");
                                continue;
                            }

                            if (!response.ok) {
                                throw new Error(`Erreur réseau HTTP ${response.status}`);
                            }

                            const result = await response.json();
                            
                            if (!result || result.error) {
                                throw new Error(result?.error?.message || "L'API a renvoyé une erreur interne.");
                            }

                            if (!result.candidates || result.candidates.length === 0) {
                                throw new Error("L'IA n'a généré aucun candidat valide.");
                            }

                            const candidate = result.candidates[0];
                            if (candidate.finishReason === "SAFETY") {
                                throw new Error("Le contenu a été bloqué par le système de sécurité de Google.");
                            }

                            const textContent = candidate?.content?.parts?.map(p => p.text || "").join("") || "";
                            if (!textContent.trim()) {
                                throw new Error("Le modèle a renvoyé une réponse vide.");
                            }

                            let cleanJson = textContent.trim();
                            const jsonMatch = cleanJson.match(/\{[\s\S]*\}/);
                            if (jsonMatch) cleanJson = jsonMatch[0];

                            const data = JSON.parse(cleanJson);
                            
                            setFormData(prev => ({ 
                                ...prev, 
                                title: data.title || prev.title,
                                lyrics: data.lyrics || prev.lyrics,
                                translation: data.translation || prev.translation,
                                songType: data.songType || prev.songType,
                                rhythm: data.rhythm || prev.rhythm,
                                note: data.note || prev.note,
                                youtubeLink: data.youtubeLink || prev.youtubeLink
                            }));

                            success = true;
                            setAiLoading(false);
                            setAiStatus("");
                            return; 

                        } catch (e) {
                            lastErrorMessage = e.message;
                            if (e.message.includes("404")) break; 
                            if (e.message.includes("429")) continue; 
                            break; 
                        }
                    }
                }

                let finalMsg = "Impossible d'identifier le chant.";
                if (lastErrorMessage.includes("401")) finalMsg = "Clé API Gemini invalide.";
                else if (lastErrorMessage.includes("429")) finalMsg = "Quota gratuit épuisé (15 requêtes/min). Veuillez patienter 1 minute entière.";
                else if (lastErrorMessage.includes("JSON") || lastErrorMessage.includes("token")) finalMsg = "Format de réponse invalide.";
                else finalMsg = lastErrorMessage;
                
                setError("Erreur IA : " + finalMsg);
                setAiLoading(false);
                setAiStatus("");
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!formData.title.trim() || !user) return;
                try {
                    const collectionPath = usePersonalDBInPreview ? `songs` : `/artifacts/${appId}/public/data/songs`;
                    const data = { ...formData, updatedAt: new Date().toISOString() };
                    if (formData.id) {
                        await db.collection(collectionPath).doc(formData.id).set(data, { merge: true });
                    } else {
                        await db.collection(collectionPath).add({ ...data, createdAt: new Date().toISOString() });
                    }
                    setView('list');
                    setFormData({ title: '', lyrics: '', translation: '', rhythm: '', note: '', songType: '', youtubeLink: '' });
                } catch (err) { setError("Erreur de sauvegarde."); }
            };

            const filteredSongs = useMemo(() => {
                return songs.filter(s => {
                    const search = searchTerm.toLowerCase();
                    return (s.title.toLowerCase().includes(search) || (s.lyrics || "").toLowerCase().includes(search)) &&
                           (!selectedType || s.songType === selectedType);
                });
            }, [songs, searchTerm, selectedType]);

            if (loading && !user) return (
                <div id="loader-container" className="min-h-screen flex flex-col items-center justify-center bg-[#FFFDF9]">
                    <div className="loader mb-6"></div>
                    <h2 className="text-brand-brown font-display tracking-widest text-lg uppercase animate-pulse">Ouverture de l'Acervo...</h2>
                </div>
            );

            if (view === 'print') {
                const songsToPrint = songs.filter(s => selectedSongs.includes(s.id));
                return (
                    <div className="bg-white p-10 min-h-screen text-black font-sans">
                        <div className="no-print flex gap-4 mb-10 justify-center">
                            <button onClick={() => setView('list')} className="px-6 py-2 border-2 border-neutral-200 rounded-xl font-bold text-neutral-600 hover:bg-neutral-50 transition-colors">Retour au carnet</button>
                            <button onClick={() => window.print()} className="px-6 py-2 brand-gradient text-white rounded-xl font-bold shadow-lg hover:opacity-90 transition-opacity">Imprimer (PDF)</button>
                        </div>
                        <div className="max-w-4xl mx-auto border-b-8 border-brand-yellow pb-8 mb-16 text-center">
                            <h1 className="text-5xl font-display font-bold text-brand-coral uppercase tracking-wide">Carnet de chant</h1>
                            <p className="font-bold text-brand-yellow text-xl mt-3 tracking-widest uppercase">Senzala Villefranche</p>
                        </div>
                        <div className="space-y-24 max-w-4xl mx-auto">
                            {songsToPrint.map(s => (
                                <div key={s.id} className="break-inside-avoid border-l-[10px] border-brand-yellow/20 pl-8 py-4">
                                    <div className="flex justify-between items-end border-b-2 border-brand-coral/20 pb-4 mb-8 text-neutral-800">
                                        <h3 className="text-4xl font-display font-bold uppercase text-neutral-900 tracking-tight">{s.title}</h3>
                                        <div className="text-right">
                                            <p className="text-sm font-bold text-brand-coral uppercase tracking-widest">{s.songType}</p>
                                            <p className="text-xs font-bold text-brand-brown/70 uppercase tracking-widest mt-1">{s.rhythm}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-12 mb-10">
                                        <div>
                                            <span className="inline-block px-3 py-1 bg-brand-yellow/10 text-brand-brown text-[10px] font-black uppercase tracking-widest rounded-md mb-4 border border-brand-yellow/30">Portugais</span>
                                            <div className="whitespace-pre-wrap text-base leading-relaxed font-bold text-neutral-800">{s.lyrics}</div>
                                        </div>
                                        <div>
                                            <span className="inline-block px-3 py-1 bg-brand-coral/10 text-brand-coral text-[10px] font-black uppercase tracking-widest rounded-md mb-4 border border-brand-coral/30">Français</span>
                                            <div className="whitespace-pre-wrap text-[15px] leading-relaxed italic text-neutral-600">{s.translation}</div>
                                        </div>
                                    </div>
                                    {s.note && (
                                        <div className="mt-8 p-8 bg-neutral-50 border-t-4 border-brand-yellow rounded-br-[3rem] shadow-sm">
                                            <h4 className="text-[11px] font-black text-brand-brown uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                                                <Icon name="info" className="w-4 h-4 text-brand-yellow"/> Histoire & Contexte
                                            </h4>
                                            <p className="text-[14px] text-neutral-700 leading-relaxed font-medium">{s.note}</p>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20 overflow-x-hidden text-neutral-800 selection:bg-brand-yellow selection:text-white">
                    <header className="brand-gradient text-white p-4 sticky top-0 z-50 brand-shadow no-print">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4 cursor-pointer hover:opacity-90 transition-opacity" onClick={() => {setView('list'); setIsSelectionMode(false)}}>
                                <div className="bg-white/20 p-2.5 rounded-2xl backdrop-blur-sm">
                                    <Icon name="music" className="w-7 h-7" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-display font-bold uppercase leading-none tracking-wide">Carnet de chant</h1>
                                    <span className="text-[10px] font-bold opacity-90 uppercase tracking-[0.2em] mt-1 block">Senzala Villefranche</span>
                                </div>
                            </div>
                            <div className="flex gap-3">
                                {view === 'list' && (
                                    <>
                                        <button onClick={() => setIsSelectionMode(!isSelectionMode)} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all ${isSelectionMode ? 'bg-neutral-900/40 text-brand-yellow shadow-inner' : 'bg-white/10 hover:bg-white/20'}`}>
                                            <Icon name="file-text" className="w-4 h-4" />
                                            <span className="hidden sm:inline">{isSelectionMode ? 'Terminer Sélection' : 'Créer Livret'}</span>
                                        </button>
                                        <button onClick={() => { setFormData({title:'', lyrics:'', translation:'', rhythm:'', note:'', songType:'', youtubeLink:''}); setView('form'); }} className="flex items-center gap-2 bg-white text-brand-coral px-5 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-widest shadow-lg hover:-translate-y-0.5 hover:shadow-xl transition-all">
                                            <Icon name="plus" className="w-4 h-4" /> Nouveau
                                        </button>
                                    </>
                                )}
                                {view !== 'list' && (
                                    <button onClick={() => setView('list')} className="p-3 bg-white/10 hover:bg-white/20 rounded-full transition-colors backdrop-blur-sm">
                                        <Icon name="arrow-left" className="w-5 h-5"/>
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 animate-in">
                        {error && (
                            <div className="mb-8 bg-red-50 border-l-4 border-red-500 p-5 rounded-r-2xl flex items-center justify-between shadow-sm">
                                <div className="flex items-center gap-4 text-red-700">
                                    <Icon name="alert-circle" className="w-6 h-6 flex-shrink-0" />
                                    <span className="text-sm font-bold">{error}</span>
                                </div>
                                <button onClick={() => setError(null)} className="p-2 text-red-400 hover:bg-red-100 rounded-full transition-colors"><Icon name="plus" className="w-5 h-5 rotate-45"/></button>
                            </div>
                        )}

                        {view === 'list' && (
                            <div className="space-y-8">
                                <div className="flex flex-col md:flex-row gap-4 bg-white p-4 rounded-[2rem] shadow-sm border border-neutral-100">
                                    <div className="flex-1 relative">
                                        <Icon name="search" className="absolute left-5 top-1/2 -translate-y-1/2 text-brand-yellow w-5 h-5" />
                                        <input type="text" placeholder="Rechercher par titre ou extrait de paroles..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-14 pr-5 py-4 rounded-2xl bg-neutral-50 border-none focus:bg-white focus:ring-2 focus:ring-brand-yellow font-medium text-neutral-700 transition-all outline-none" />
                                    </div>
                                    <div className="md:w-1/3 relative">
                                        <select value={selectedType} onChange={(e) => setSelectedType(e.target.value)} className="w-full pl-5 pr-12 py-4 rounded-2xl bg-neutral-50 border-none font-bold text-brand-brown appearance-none cursor-pointer focus:bg-white focus:ring-2 focus:ring-brand-yellow transition-all outline-none">
                                            <option value="">Tous les styles</option>
                                            {SONG_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                        <div className="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-brand-coral">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                        </div>
                                    </div>
                                </div>

                                {isSelectionMode && (
                                    <div className="bg-brand-yellow/10 border-2 border-brand-yellow p-6 rounded-[2rem] flex flex-col sm:flex-row justify-between items-center gap-4 animate-in shadow-inner">
                                        <div className="flex items-center gap-3">
                                            <div className="bg-brand-yellow text-white w-10 h-10 rounded-full flex items-center justify-center font-display font-bold text-xl">{selectedSongs.length}</div>
                                            <p className="font-black text-brand-brown text-sm uppercase tracking-widest">chants prêts pour l'impression</p>
                                        </div>
                                        <button onClick={() => setView('print')} disabled={selectedSongs.length === 0} className="w-full sm:w-auto bg-brand-coral text-white px-8 py-3.5 rounded-xl font-black text-xs uppercase shadow-lg disabled:opacity-50 disabled:cursor-not-allowed hover:-translate-y-0.5 transition-transform tracking-widest">
                                            Générer le PDF
                                        </button>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {filteredSongs.length > 0 ? filteredSongs.map(s => (
                                        <div key={s.id} onClick={() => isSelectionMode ? toggleSelection(s.id) : (setCurrentSong(s), setView('detail'))}
                                             className={`bg-white p-7 rounded-[2.5rem] shadow-sm border-2 transition-all cursor-pointer relative group flex flex-col h-full
                                             ${isSelectionMode && selectedSongs.includes(s.id) ? 'border-brand-yellow bg-brand-yellow/5 scale-[0.98]' : 'border-transparent hover:border-brand-yellow/40 hover:shadow-md'}`}>
                                            
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="flex flex-wrap gap-2">
                                                    <span className="px-2.5 py-1 bg-brand-yellow/10 text-brand-brown text-[9px] font-black uppercase tracking-[0.2em] rounded-md border border-brand-yellow/20">{s.songType || 'Chant'}</span>
                                                    {s.rhythm && <span className="px-2.5 py-1 bg-neutral-100 text-neutral-500 text-[9px] font-black uppercase tracking-[0.2em] rounded-md">{s.rhythm}</span>}
                                                </div>
                                                {isSelectionMode ? (
                                                    <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center transition-colors ${selectedSongs.includes(s.id) ? 'bg-brand-yellow border-brand-yellow' : 'border-neutral-200 bg-neutral-50'}`}>
                                                        {selectedSongs.includes(s.id) && <Icon name="check" className="w-4 h-4 text-white"/>}
                                                    </div>
                                                ) : (
                                                    s.youtubeLink && <div className="text-red-500 opacity-50 group-hover:opacity-100 transition-opacity"><Icon name="youtube" className="w-5 h-5" /></div>
                                                )}
                                            </div>
                                            
                                            <h3 className="text-2xl font-display font-bold text-neutral-800 mb-3 group-hover:text-brand-coral transition-colors line-clamp-2 uppercase tracking-tight leading-none">{s.title}</h3>
                                            <p className="text-[13px] text-neutral-500 line-clamp-4 leading-relaxed italic font-medium flex-grow">{s.lyrics}</p>
                                        </div>
                                    )) : (
                                        <div className="col-span-full py-32 text-center flex flex-col items-center justify-center">
                                            <div className="w-24 h-24 bg-neutral-50 rounded-full flex items-center justify-center mb-6 text-neutral-300">
                                                <Icon name="music" className="w-10 h-10" />
                                            </div>
                                            <p className="text-neutral-400 font-bold uppercase tracking-widest text-sm">Le catalogue est vide</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'detail' && currentSong && (
                            <div className="bg-white rounded-[3rem] shadow-sm border border-neutral-100 animate-in">
                                <div className="p-8 md:p-12 border-b-8 border-brand-yellow/20">
                                    <div className="flex flex-col md:flex-row justify-between items-start gap-6">
                                        <div>
                                            <div className="flex flex-wrap items-center gap-3 mb-5">
                                                <span className="px-4 py-1.5 bg-brand-coral text-white text-[10px] font-black uppercase rounded-lg tracking-widest shadow-sm">{currentSong.songType}</span>
                                                <span className="px-4 py-1.5 bg-neutral-100 text-brand-brown border border-neutral-200 text-[10px] font-black uppercase rounded-lg tracking-widest">{currentSong.rhythm}</span>
                                            </div>
                                            <h2 className="text-5xl md:text-7xl font-display font-bold text-neutral-900 uppercase tracking-tighter leading-none text-balance">{currentSong.title}</h2>
                                        </div>
                                        <div className="flex gap-3 bg-neutral-50 p-2 rounded-2xl border border-neutral-100">
                                            {currentSong.youtubeLink && (
                                                <a href={currentSong.youtubeLink} target="_blank" rel="noopener noreferrer" className="p-3 bg-white text-red-600 rounded-xl hover:bg-red-50 hover:text-red-700 shadow-sm transition-colors" title="Écouter sur YouTube">
                                                    <Icon name="youtube" />
                                                </a>
                                            )}
                                            <button onClick={() => { setFormData(currentSong); setView('form'); }} className="p-3 bg-white text-brand-purple rounded-xl hover:bg-purple-50 shadow-sm transition-colors" title="Modifier">
                                                <Icon name="edit" />
                                            </button>
                                            <button onClick={async () => { if(confirm("Supprimer définitivement ce chant ?")) { await db.collection(usePersonalDBInPreview ? `songs` : `/artifacts/${appId}/public/data/songs`).doc(currentSong.id).delete(); setView('list'); } }} className="p-3 bg-white text-neutral-400 rounded-xl hover:bg-red-50 hover:text-red-600 shadow-sm transition-colors" title="Supprimer">
                                                <Icon name="trash" />
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-8 md:p-12">
                                    <div className="grid lg:grid-cols-3 gap-12">
                                        <div className="lg:col-span-2">
                                            <div className="grid md:grid-cols-2 gap-10">
                                                <section className="bg-brand-yellow/5 p-8 rounded-[2.5rem] border border-brand-yellow/10">
                                                    <h4 className="text-[11px] font-black text-brand-brown mb-6 uppercase tracking-[0.2em] flex items-center gap-3">
                                                        <span className="w-2 h-2 rounded-full bg-brand-yellow"></span> Paroles (PT)
                                                    </h4>
                                                    <div className="whitespace-pre-wrap text-lg font-bold leading-relaxed text-neutral-800">{currentSong.lyrics}</div>
                                                </section>
                                                <section className="bg-neutral-50 p-8 rounded-[2.5rem] border border-neutral-100">
                                                    <h4 className="text-[11px] font-black text-brand-coral mb-6 uppercase tracking-[0.2em] flex items-center gap-3">
                                                        <span className="w-2 h-2 rounded-full bg-brand-coral"></span> Traduction (FR)
                                                    </h4>
                                                    <div className="whitespace-pre-wrap text-[17px] font-medium italic text-neutral-600 leading-relaxed">{currentSong.translation}</div>
                                                </section>
                                            </div>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="p-8 bg-brand-purple/5 rounded-[2.5rem] border border-brand-purple/10">
                                                <h4 className="text-[11px] font-black text-brand-purple uppercase tracking-[0.2em] flex items-center gap-2 mb-4">
                                                    <Icon name="info" className="w-4 h-4"/> Histoire & Culture
                                                </h4>
                                                <p className="text-sm text-neutral-700 leading-relaxed font-medium">{currentSong.note || "L'histoire de ce chant n'a pas encore été documentée."}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'form' && (
                            <div className="max-w-4xl mx-auto bg-white rounded-[3rem] shadow-xl border border-neutral-100 animate-in overflow-hidden">
                                <div className="bg-neutral-50 p-8 md:p-12 border-b border-neutral-100">
                                    <h2 className="text-4xl font-display font-bold text-brand-coral uppercase tracking-wide">
                                        {formData.id ? 'Modifier le chant' : 'Nouveau Chant'}
                                    </h2>
                                    <p className="text-brand-brown font-bold text-sm mt-2 opacity-80">Enrichissez le patrimoine musical de la Capoeira.</p>
                                </div>
                                
                                <form onSubmit={handleSave} className="p-8 md:p-12 space-y-10">
                                    <div className="bg-brand-purple p-8 rounded-[2.5rem] text-white flex flex-col md:flex-row items-center justify-between gap-6 shadow-lg relative overflow-hidden group">
                                        <div className="absolute -right-10 -top-10 opacity-10 rotate-12 scale-150 transition-transform group-hover:scale-[1.7] group-hover:rotate-45 duration-700">
                                            <Icon name="settings" className="w-48 h-48" />
                                        </div>
                                        <div className="relative z-10 flex-1">
                                            <h4 className="font-display font-bold text-2xl mb-2 tracking-wide text-brand-yellow flex items-center gap-3">
                                                Assistant IA <span className="animate-pulse text-white">✨</span>
                                            </h4>
                                            <p className="text-xs text-white/90 leading-relaxed max-w-md font-medium">Entrez un titre ou un court fragment ci-dessous, puis cliquez sur générer. L'IA complétera les paroles, la traduction, le rythme et le style exacts.</p>
                                        </div>
                                        <button type="button" onClick={handleGenerateAI} disabled={aiLoading || !formData.title} className="relative z-10 bg-brand-yellow text-brand-brown px-8 py-4 rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] shadow-xl hover:scale-105 hover:bg-white hover:text-brand-coral transition-all disabled:opacity-50 disabled:hover:scale-100 flex items-center justify-center gap-2 min-w-[200px]">
                                            {aiLoading ? <span className="animate-pulse">{aiStatus || "Génération..."}</span> : "Générer les données"}
                                        </button>
                                    </div>

                                    <div className="grid sm:grid-cols-12 gap-8">
                                        <div className="sm:col-span-7">
                                            <label className="text-[10px] font-black text-brand-brown uppercase mb-3 block tracking-[0.2em]">Titre ou fragment pour l'IA</label>
                                            <input type="text" required value={formData.title} onChange={(e) => setFormData({...formData, title: e.target.value})} placeholder="Ex: Paranauê, Mandei benzer..." className="w-full p-5 bg-neutral-50 rounded-2xl outline-none font-display font-bold text-2xl focus:ring-4 focus:ring-brand-yellow/20 focus:bg-white transition-all shadow-inner border border-neutral-100 text-neutral-800 placeholder:text-neutral-300" />
                                        </div>
                                        <div className="sm:col-span-5 flex gap-4 pt-7">
                                            <div className="flex-1">
                                                <label className="text-[10px] font-black text-neutral-400 uppercase mb-2 block tracking-widest">Style</label>
                                                <select value={formData.songType} onChange={(e) => setFormData({...formData, songType: e.target.value})} className="w-full p-4 bg-neutral-50 rounded-xl font-bold text-sm text-neutral-700 appearance-none cursor-pointer focus:ring-2 focus:ring-brand-coral outline-none border border-neutral-100 shadow-sm">
                                                    <option value="">Sélectionner</option>
                                                    {SONG_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                                </select>
                                            </div>
                                            <div className="flex-1">
                                                <label className="text-[10px] font-black text-neutral-400 uppercase mb-2 block tracking-widest">Rythme</label>
                                                <select value={formData.rhythm} onChange={(e) => setFormData({...formData, rhythm: e.target.value})} className="w-full p-4 bg-neutral-50 rounded-xl font-bold text-sm text-neutral-700 appearance-none cursor-pointer focus:ring-2 focus:ring-brand-coral outline-none border border-neutral-100 shadow-sm">
                                                    <option value="">Sélectionner</option>
                                                    {RHYTHMS.map(r => <option key={r} value={r}>{r}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid sm:grid-cols-2 gap-8">
                                        <div className="relative">
                                            <label className="text-[10px] font-black text-brand-yellow uppercase mb-3 block tracking-[0.2em] bg-brand-yellow/10 inline-block px-3 py-1 rounded-md">Paroles Originales (PT)</label>
                                            <textarea rows={12} placeholder="Saisissez les paroles..." value={formData.lyrics} onChange={(e) => setFormData({...formData, lyrics: e.target.value})} className="w-full p-6 bg-neutral-50 rounded-[2rem] font-bold outline-none shadow-inner leading-relaxed focus:bg-white focus:ring-2 focus:ring-brand-yellow/30 transition-all border border-neutral-100 text-neutral-800 resize-none" />
                                        </div>
                                        <div className="relative">
                                            <label className="text-[10px] font-black text-brand-coral uppercase mb-3 block tracking-[0.2em] bg-brand-coral/10 inline-block px-3 py-1 rounded-md">Traduction (FR)</label>
                                            <textarea rows={12} placeholder="Saisissez la traduction..." value={formData.translation} onChange={(e) => setFormData({...formData, translation: e.target.value})} className="w-full p-6 bg-orange-50/30 rounded-[2rem] italic font-medium outline-none shadow-inner leading-relaxed focus:bg-white focus:ring-2 focus:ring-brand-coral/30 transition-all border border-orange-50 text-neutral-600 resize-none" />
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-brand-purple uppercase tracking-[0.2em] bg-brand-purple/10 inline-block px-3 py-1 rounded-md">Note Historique & Explicative</label>
                                        <textarea rows={4} value={formData.note} onChange={(e) => setFormData({...formData, note: e.target.value})} placeholder="Contexte, auteur, histoire du chant..." className="w-full p-6 bg-neutral-50 rounded-[2rem] font-medium outline-none shadow-inner leading-relaxed focus:bg-white focus:ring-2 focus:ring-brand-purple/30 transition-all border border-neutral-100 text-neutral-700 resize-none" />
                                    </div>
                                    
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-red-500 uppercase tracking-[0.2em] bg-red-50 inline-block px-3 py-1 rounded-md flex items-center gap-2 w-max"><Icon name="youtube" className="w-3 h-3"/> Lien YouTube de Référence</label>
                                        <input type="url" value={formData.youtubeLink} onChange={(e) => setFormData({...formData, youtubeLink: e.target.value})} placeholder="https://www.youtube.com/watch?v=..." className="w-full p-5 bg-neutral-50 rounded-xl outline-none text-sm font-bold shadow-inner border border-neutral-100 focus:bg-white focus:ring-2 focus:ring-red-200 transition-all" />
                                    </div>

                                    <div className="flex flex-col md:flex-row justify-end items-center gap-4 pt-10 border-t border-neutral-100">
                                        <button type="button" onClick={() => setView('list')} className="w-full md:w-auto px-8 py-4 font-black text-neutral-400 uppercase text-[10px] tracking-widest hover:bg-neutral-50 rounded-xl transition-colors">Annuler</button>
                                        <button type="submit" className="w-full md:w-auto brand-gradient text-white px-12 py-4 rounded-xl font-black shadow-lg uppercase text-xs tracking-widest flex items-center justify-center gap-3 hover:-translate-y-0.5 hover:shadow-xl transition-all">
                                            <Icon name="save" className="w-4 h-4" /> Enregistrer le chant
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </main>
                    <footer className="mt-24 pb-12 text-center text-neutral-400 no-print">
                        <div className="w-16 h-1 bg-brand-yellow/30 mx-auto rounded-full mb-8"></div>
                        <p className="text-[10px] font-black uppercase tracking-[0.4em] text-brand-brown/50">Senzala Villefranche • Projet Acervo 2026</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
